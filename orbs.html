<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WARDEN · orb studio</title>
    <style>
      /* Standalone orb-studio: three wireframe directions at max quality, free camera.
         Fully isolated from the app/war-room so it never collides with live work. */
      :root {
        --bg: #020403;
        --green: #76ff9d;
        --emerald: #3dffa0;
        --acid: #b8ff6b;
        --amber: #ff5a37;
        --violet: #b98cff;
        --mono: "SF Mono", "WardenMono", Menlo, Consolas, monospace;
      }
      html, body { height: 100%; margin: 0; background: var(--bg); overflow: hidden; }
      #orb-root { position: fixed; inset: 0; }
      canvas { display: block; touch-action: none; }

      /* ---- HUD overlay (non-interactive, never blocks the drag) ---- */
      .hud { position: fixed; inset: 0; pointer-events: none; z-index: 5; font-family: var(--mono); }
      .hud-mark {
        position: absolute; top: 22px; left: 26px;
        display: flex; align-items: baseline; gap: 12px;
      }
      .hud-mark .sig {
        font-size: 13px; letter-spacing: 0.42em; text-transform: uppercase;
        color: var(--green); text-shadow: 0 0 18px rgba(118,255,157,0.55);
      }
      .hud-mark .ver { font-size: 10px; letter-spacing: 0.3em; color: #3f7a5a; text-transform: uppercase; }
      .hud-title {
        position: absolute; top: 52px; left: 26px;
        font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; color: #5f8f74;
      }

      .hud-hint {
        position: absolute; bottom: 22px; left: 26px;
        font-size: 11px; letter-spacing: 0.16em; color: #4d7d63;
        display: flex; gap: 18px; align-items: center;
      }
      .hud-hint b { color: var(--green); font-weight: 500; }
      .hud-hint .dot { width: 3px; height: 3px; border-radius: 50%; background: #2c5a40; }

      .hud-legend {
        position: absolute; bottom: 22px; right: 26px;
        display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
      }
      .hud-legend .row { display: flex; align-items: center; gap: 9px; color: #6f9d82; }
      .hud-legend .row i {
        width: 9px; height: 9px; border-radius: 2px; display: inline-block;
        box-shadow: 0 0 12px currentColor; font-style: normal;
      }

      /* ---- per-orb floating labels (drei <Html>) ---- */
      .orb-label { text-align: center; white-space: nowrap; transform: translateY(0); }
      .orb-label .k {
        display: block; font-size: 12.5px; letter-spacing: 0.3em; font-weight: 600;
        text-shadow: 0 0 16px currentColor;
      }
      .orb-label .t {
        display: block; margin-top: 4px; font-size: 9.5px; letter-spacing: 0.22em;
        color: #5f8f74; text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="orb-root"></div>
    <script type="module" src="/web/viz/dev/preview/orbLab.tsx"></script>
  </body>
</html>
