<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WARDEN</title>
  </head>
  <body>
    <!-- Ambient R3F war-room backdrop; the React island mounts here once. -->
    <div id="war-room-root" aria-hidden="true"></div>
    <main id="terminal" aria-label="WARDEN terminal overlay">
      <section class="chrome">
        <div class="sigil">WARDEN</div>
        <div class="hud" aria-label="WARDEN runtime metrics">
          <div class="hud-cell">
            <span class="hud-label">sessions</span>
            <span class="hud-value" id="hud-sessions">—</span>
          </div>
          <div class="hud-cell">
            <span class="hud-label">events</span>
            <span class="hud-value" id="hud-events">—</span>
          </div>
          <div class="hud-cell">
            <span class="hud-label">findings</span>
            <span class="hud-value" id="hud-findings">—</span>
          </div>
          <div class="hud-cell">
            <span class="hud-label">stage</span>
            <span class="hud-value" id="hud-stage">cold boot</span>
          </div>
        </div>
        <div class="status" id="status">cold boot</div>
      </section>
      <section id="screen" class="screen" role="log" aria-live="polite"></section>
      <form id="prompt" autocomplete="off">
        <span class="chevron">&gt;</span>
        <input id="command" autofocus spellcheck="false" value="what's wrong with how I use my agents?" />
        <button id="run-button" type="submit">RUN</button>
      </form>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
