<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WARDEN</title>
  </head>
  <body>
    <canvas id="war-room"></canvas>
    <main id="terminal" aria-label="WARDEN terminal overlay">
